}
function checkAnswer(btn, chosen){

 document.querySelectorAll(".choice").forEach(b=>{ if(b.textContent===currentQuestion.meaning) b.classList.add("correct"); });

function saveWrong(item){

}
function showWrongNote(){
 const wrongs=JSON.parse(localStorage.getItem("wm_text_wrong_50")||"[]");

}
function clearWrongNote(){if(confirm("오답노트를 모두 삭제할까요?")){localStorage.removeItem("wm_text_wrong_50");showWrongNote();}}
